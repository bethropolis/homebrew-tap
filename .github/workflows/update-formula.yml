name: Update Homebrew Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.3.5)"
        required: true

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4

      - name: Fetch SHA256 hashes from GitHub API
        id: hashes
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          API="https://api.github.com/repos/bethropolis/localgo/releases/tags/${VERSION}"
          ASSETS=$(curl -sL "$API" | jq -r '.assets[] | "\(.name) \(.digest)"')

          get_sha() {
            echo "$ASSETS" | grep "^$1 " | awk '{print $2}' | sed 's/sha256://'
          }

          echo "macos_arm64=$(get_sha localgo-macos-arm64)" >> $GITHUB_OUTPUT
          echo "macos_amd64=$(get_sha localgo-macos-amd64)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(get_sha localgo-linux-arm64)" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(get_sha localgo-linux-amd64)" >> $GITHUB_OUTPUT

      - name: Update formula
        env:
          VERSION: ${{ github.event.inputs.version }}
          MACOS_ARM64: ${{ steps.hashes.outputs.macos_arm64 }}
          MACOS_AMD64: ${{ steps.hashes.outputs.macos_amd64 }}
          LINUX_ARM64: ${{ steps.hashes.outputs.linux_arm64 }}
          LINUX_AMD64: ${{ steps.hashes.outputs.linux_amd64 }}
        run: |
          VER="${VERSION#v}"
          sed -i "s/version \".*\"/version \"${VER}\"/" Formula/localgo.rb
          sed -i "/macos-arm64/{n;s/sha256 \".*\"/sha256 \"${MACOS_ARM64}\"/}" Formula/localgo.rb
          sed -i "/macos-amd64/{n;s/sha256 \".*\"/sha256 \"${MACOS_AMD64}\"/}" Formula/localgo.rb
          sed -i "/linux-arm64/{n;s/sha256 \".*\"/sha256 \"${LINUX_ARM64}\"/}" Formula/localgo.rb
          sed -i "/linux-amd64/{n;s/sha256 \".*\"/sha256 \"${LINUX_AMD64}\"/}" Formula/localgo.rb

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/localgo.rb
          git commit -m "localgo ${{ github.event.inputs.version }}"
          git push
